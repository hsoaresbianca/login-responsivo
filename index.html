<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="stylesheet" href="estilos/style.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
            </div>
            
            <div id="formulario">
                <h1>Login</h1>
                
                <p>Seja bem-vindo(a) novamente. Faça o login para acessar a sua conta.</p>
                
                <form action="login.php" method="post" autocomplete="on">
                    
                    <div id="div-email">
                        <label for="iemail">👤</label>
                        <input type="email" name="email" id="iemail" required autocomplete="email" placeholder="E-mail">
                    </div>

                    <div id="div-senha">
                        <label for="isenha">🔐</label>
                        <input type="password" name="senha" id="isenha" required minlength="8" placeholder="Senha">
                    </div>

                    <input id="entrar" type="submit" value="Entrar"> <br>
                    <input id="esqueci-senha" type="reset" value="Esqueci a senha">
                </form>
            </div>
        </section>
    </main>
</body>
</html>
