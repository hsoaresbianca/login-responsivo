<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="stylesheet" href="estilos/style.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
            </div>
            
            <div id="formulario">
                <h1>Login</h1>
                
                <p>Seja bem-vindo(a) novamente. Faça o login para acessar a sua conta.</p>
                
                <form action="login.php" method="post" autocomplete="on">
                    
                    <label for="iemail">Email: </label>
                    <input type="email" name="email" id="iemail" required autocomplete="email" placeholder="usuario@email"> <br>

                    <label for="isenha">Senha: </label>
                    <input type="password" name="senha" id="isenha" required minlength="8"> <br>

                    <input type="submit" value="Entrar">
                    <input type="reset" value="Limpar">
                </form>
            </div>
        </section>
    </main>
</body>
</html>
