<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-query.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
            </div>
            
            <div id="formulario">
                <h1>Login</h1>
                
                <p>Seja bem-vindo(a)!</p>
                <p>Faça o login para acessar a sua conta.</p>
                
                <form action="login.php" method="post" autocomplete="on">
                    
                    <div id="div-email">
                        <label for="iemail" class="material-symbols-outlined">
                            <ion-icon name="person"></ion-icon>
                        </label>
                        <input type="email" name="email" id="iemail" required autocomplete="email" placeholder="E-mail">
                    </div>

                    <div id="div-senha">
                        <label for="isenha" class="material-symbols-outlined">
                            <ion-icon name="key"></ion-icon>
                        </label>
                        <input type="password" name="senha" id="isenha" required minlength="8" maxlength="18" placeholder="Senha">
                    </div>

                    <input id="entrar" type="submit" value="Entrar"> <br>
                    <input id="esqueci-senha" type="reset" value="Esqueci a senha">
                </form>
            </div>
        </section>
    </main>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
